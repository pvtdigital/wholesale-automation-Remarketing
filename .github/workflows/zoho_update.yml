name: Update Zoho CRM Leads - Wholesale
on:
  workflow_dispatch:
  # No cron schedule - Zoho Flow handles scheduling via workflow_dispatch trigger
permissions:
  actions: write
  contents: read
jobs:
  update-leads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install libraries
        run: pip install requests
      - name: Run Lead Update Script
        env:
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
        run: python update_leads.py
